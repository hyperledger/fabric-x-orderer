syntax = "proto3";

package state;

option go_package = "github.com/hyperledger/fabric-x-orderer/node/protos/state";

// ShardTerm represents a shard and its term
message ShardTerm {
  uint32 shard = 1;
  uint64 term = 2;
}

// BatchAttestationFragment represents a batch attestation fragment
message BatchAttestationFragment {
  uint32 shard = 1;
  uint32 primary = 2;
  uint64 seq = 3;
  bytes digest = 4;
  uint64 config_sequence = 5;
  uint64 tx_count = 6;
  uint32 signer = 7;
  bytes signature = 8;
  bytes primary_signature = 9;
}

// Complaint represents a complaint about a batcher
message Complaint {
  uint64 config_seq = 1;
  uint32 shard = 2;
  uint64 term = 3;
  uint32 signer = 4;
  bytes signature = 5;
  string reason = 6;
}

// ConfigRequest represents a configuration update request
message ConfigRequest {
  bytes envelope = 1;  // common.Envelope serialized
}

// ControlEvent represents a control event that can be one of several types
message ControlEvent {
  oneof event {
    BatchAttestationFragment baf = 1; // BatchAttestationFragment from a batcher
    Complaint complaint = 2;          // Complaint from a batcher
    ConfigRequest config_request = 3; // Configuration update request
  }
}

// State represents the state of the consensus
message State {
  uint32 number_of_parties = 1;
  repeated ShardTerm shards = 2; // The different shards and their current terms
  repeated BatchAttestationFragment pending = 3;  // Pending batch attestation fragments received by consenters from batchers
  repeated Complaint complaints = 4; // Complaints received by consenters from batchers
  bytes app_context = 5; // Auxiliary data that may be served as context to the application
}
name: Deterministic Failure Test

on:
  schedule:
    # Sunday-Thursday: 2-hour test
    - cron: '0 3 * * 0-4'
    # Friday: Extended 5.5-hour test
    - cron: '0 3 * * 5'

  workflow_dispatch:
    inputs:
      duration_minutes:
        description: 'Test duration in minutes'
        required: true
        default: '120'
        type: string
      tx_rate:
        description: 'Transactions per second'
        required: true
        default: '1000'
        type: string
      tx_size:
        description: 'Transaction size in bytes'
        required: true
        default: '300'
        type: string
      num_parties:
        description: 'Number of parties (4, 7, or 10)'
        required: true
        default: '4'
        type: choice
        options:
          - '4'
          - '7'
          - '10'
      num_shards:
        description: 'Number of shards (1, 2, or 4)'
        required: true
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
      failure_runner_enabled:
        description: 'Enable deterministic failure runner'
        required: true
        default: true
        type: boolean
      failure_runner_initial_wait:
        description: 'Wait before starting deterministic failure runner (seconds)'
        required: true
        default: '300'
        type: string
      failure_runner_stop_duration:
        description: 'How long to keep component down (seconds)'
        required: true
        default: '60'
        type: string
      failure_runner_restart_wait:
        description: 'Wait after component restart (seconds)'
        required: true
        default: '60'
        type: string

env:
  GOPATH: /opt/go
  PATH: /opt/go/bin:/bin:/usr/bin:/sbin:/usr/sbin:/usr/local/bin:/usr/local/sbin

permissions:
  contents: read

jobs:
  deterministic-failure-test:
    name: Deterministic Failure Test
    runs-on: ubuntu-latest
    timeout-minutes: 350
    if: github.repository == 'hyperledger/fabric-x-orderer' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Fabric-X Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build arma and armageddon binaries
        run: make binary

      - name: Determine test duration
        id: duration
        run: |
          if [ -n "${{ inputs.duration_minutes }}" ]; then
            echo "minutes=${{ inputs.duration_minutes }}" >> $GITHUB_OUTPUT
            echo "Manual trigger: Using ${{ inputs.duration_minutes }} minutes"
          else
            DAY_OF_WEEK=$(date -u +%u)
            if [ "$DAY_OF_WEEK" = "7" ]; then
              DAY_OF_WEEK=0
            fi

            if [ "$DAY_OF_WEEK" = "5" ]; then
              echo "minutes=330" >> $GITHUB_OUTPUT
              echo "Friday: Using extended duration (330 minutes / 5.5 hours)"
            else
              echo "minutes=120" >> $GITHUB_OUTPUT
              echo "Weekday: Using standard duration (120 minutes / 2 hours)"
            fi
          fi

      - name: Run Deterministic Failure Test
        env:
          DURATION_MINUTES: ${{ steps.duration.outputs.minutes }}
          TX_RATE: ${{ inputs.tx_rate || '1000' }}
          TX_SIZE: ${{ inputs.tx_size || '300' }}
          NUM_PARTIES: ${{ inputs.num_parties || '4' }}
          NUM_SHARDS: ${{ inputs.num_shards || '2' }}
          FAILURE_RUNNER_ENABLED: ${{ inputs.failure_runner_enabled != false }}
          FAILURE_RUNNER_INITIAL_WAIT: ${{ inputs.failure_runner_initial_wait || '300' }}
          FAILURE_RUNNER_STOP_DURATION: ${{ inputs.failure_runner_stop_duration || '60' }}
          FAILURE_RUNNER_RESTART_WAIT: ${{ inputs.failure_runner_restart_wait || '60' }}
        run: |
          chmod +x test/deterministic-failure-test/*.sh
          test/deterministic-failure-test/deterministic-failure-test.sh

      - name: Publish test summary
        if: always()
        run: |
          echo "## Deterministic Failure Test — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          if [ -d test-results/summary ] && [ -n "$(ls -A test-results/summary 2>/dev/null)" ]; then
            cat test-results/summary/* >> $GITHUB_STEP_SUMMARY
          else
            echo "_No summary files were produced._" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload statistics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deterministic-failure-test-statistics-${{ github.run_number }}
          path: test-results/statistics/
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deterministic-failure-test-logs-${{ github.run_number }}
          path: test-results/logs/
          retention-days: 30
          if-no-files-found: ignore
